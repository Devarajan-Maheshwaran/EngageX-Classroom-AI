
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: engagex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend-node:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=engagex
    depends_on:
      - postgres
      - redis

  backend-python:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=http://postgres:5432 # We can leave this for now, but really python backend uses supabase client. A real supabase setup involves more than postgres. For local testing without supabase cloud, we might just mock the endpoints, but we can also use the postgres db directly using psycopg2. Wait, the python backend expects Supabase Cloud (Rest API). We can't just point the supabase JS/Python client to raw postgres. It needs PostgREST! So we should probably spin up Supabase locally. But full Supabase local takes 10+ containers. Maybe we'll just run it as a dummy for now.
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend-node
      - backend-python
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_PYTHON_BACKEND_URL=http://localhost:4001

volumes:
  postgres_data:
  redis_data:
