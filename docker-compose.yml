
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: engagex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend-node:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=engagex
    depends_on:
      - postgres
      - redis

  backend-python:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      # Note: Python backend uses the Supabase SDK which requires a PostgREST API (not raw postgres:5432).
      # Configure your real SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in your .env file.
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend-node
      - backend-python
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_PYTHON_BACKEND_URL=http://localhost:4001

volumes:
  postgres_data:
  redis_data:
