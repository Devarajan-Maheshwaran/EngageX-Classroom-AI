version: '3.8'

services:
  backend-node:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    ports:
      - "4000:4000"
    env_file:
      - .env
    # Node backend relies on SUPABASE_URL from .env.
    # We removed local postgres/redis since event bus is in-memory 
    # and DB is hosted Supabase.

  backend-python:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "4001:4001"
    env_file:
      - .env
    # Python backend relies on SUPABASE_URL from .env.

  # Frontend container is kept for local development without Vercel.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend-node
      - backend-python
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_PYTHON_BACKEND_URL=http://localhost:4001
